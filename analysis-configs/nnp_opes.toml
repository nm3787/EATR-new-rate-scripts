[analysis]
input_root = "../nnp-rate-data/opes"
output_root = "../nnp-rate-data/analysis/opes"
timeunit_seconds = 1e-12
temperature_k = 300.0
energyunit_kj_per_mol = 4.184
bootstrap_resamples = 50
threads_env_var = "EATR_THREADS"

[filesystem]
cv_dir_prefix = "bias_"
barrier_dir_prefix = "barrier"
run_dir_prefix = "s"
colvar_glob = "*.colvar.dat"
log_glob = "*.plumed.log"

[columns]
bias_col = 11

[filtering]
max_barrier_included = 8.0
