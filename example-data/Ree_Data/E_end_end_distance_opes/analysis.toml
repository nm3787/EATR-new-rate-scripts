[analysis]
input_root = ".."
output_root = "../../toml-example-results/opes"
timeunit_seconds = 1e-12
temperature_k = 312.0
energyunit_kj_per_mol = 1.0
bootstrap_resamples = 50
threads_env_var = "EATR_THREADS"

[filesystem]
cv_dir_prefix = "E_end_end_distance_opes"
barrier_dir_prefix = "eruns_barr"
run_dir_prefix = "run_"
colvar_glob = "opes_short.colvar"
log_glob = "p.log"

[columns]
bias_col = 4

[filtering]
max_barrier_included = 13.0
